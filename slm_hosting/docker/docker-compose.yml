version: '3.8'

services:
  # 1. Tầng Model 
  #vllm-service:
  #image: ollama/ollama:latest
  #container_name: slm_ollama
  #volumes:
  #- ollama_data:/root/.ollama
  #ports:
  #- "11434:11434"
  # Khởi động server và tự động tải model Qwen
  #entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull qwen2.5:1.5b && wait"

  # 2. Tầng Nghiệp vụ
  api-wrapper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slm_api
    environment:
      # Trỏ URL nội bộ về phía container ollama
      - VLLM_URL=http://vllm-service:11434/v1/chat/completions
      #depends_on:
      #- vllm-service

      # 3. Tầng Proxy
  nginx:
    image: nginx:latest
    container_name: slm_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80" # Publish ra port 80 mặc định
    depends_on:
      - api-wrapper

volumes:
  ollama_data:
